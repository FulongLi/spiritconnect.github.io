<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#06090f"/>
  <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}"/>
  <link rel="icon" type="image/svg+xml" href="{{ '/images/general/logo_svg.svg' | relative_url }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ '/images/general/logo_192.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="48x48" href="{{ '/assets/favicon-48.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon-16.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="192x192" href="{{ '/images/general/logo_192.png' | relative_url }}">
  <meta property="og:image" content="{{ site.url }}/images/general/logo_192.png">
  <meta property="og:image:width" content="192">
  <meta property="og:image:height" content="192">
  {% seo %}
</head>
<body>
  {% include navbar.html %}
  {{ content }}
  {% include footer.html %}
  {% include scripts.html %}
</body>
</html>
